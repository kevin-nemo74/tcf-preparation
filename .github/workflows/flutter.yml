name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze_test_and_release_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Android release compile check
        run: flutter build apk --release

      - name: Web release compile check
        run: flutter build web --release
